services:
  postgres:
    image: postgres:16-alpine
    container_name: seat-reservation-postgres
    environment:
      POSTGRES_USER: seat_reservation
      POSTGRES_PASSWORD: seat_reservation
      POSTGRES_DB: seat_reservation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seat_reservation -d seat_reservation"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - seat_reservation_network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: seat-reservation-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: seat_reservation
      RABBITMQ_DEFAULT_PASS: seat_reservation
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - seat_reservation_network

  redis:
    image: redis:7-alpine
    container_name: seat-reservation-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - seat_reservation_network

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:

networks:
  seat_reservation_network:
    name: seat-reservation-network
